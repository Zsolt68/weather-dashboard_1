<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Weather Dashboard that displays current weather and a 5-day forecast for any searched city.">

     <title>Weather Dashboard</title>

    <!-- Favicon -->
    <link rel="stylesheet" href="assets/css/style.css" />
    <link
      rel="icon"
      type="image/png"
      href="assets/images/icon-rain-cloud.png"
    />
<!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
 <!-- Bootstrap CSS -->
  

    <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css" />
   
  </head>

  <body>
 <!-- Page Wrapper -->
  <div class="page-wrapper">
 
    <!-- Header -->
    <header class="header-box">
      <h1>Weather Dashboard</h1>
    </header>
    
 <!-- Main Grid -->
    <main class="main-grid">

      <!-- Left Column -->
      <div class="left-column">

 <!-- Search Section -->
        <section id="search-section">
      <h2>Search City</h2>

      <form id="search-form">
            <input id="city-input" placeholder="Enter city name">
            <button id="search-btn" type="submit">Search</button>
          </form>

          <div id="search-message"></div>
        </section>

    <!-- History Section -->
        <section id="history-section">
          <h3>Recent Searches</h3>
          <ul id="history-list"></ul>
        </section>

      </div> <!-- END Left Column --> 

       <!-- Right Column -->
      <div class="right-column">

         <!-- Current Weather -->
        <section id="current-weather">
          <h2>Current Weather</h2>

           <div id="current-weather-card">
            <h3 id="city-name">City</h3>
            <p id="current-date"></p>

             <div class="weather-main-row">
              <img id="weather-icon" src ="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" alt="Weather icon">

               <div>
                <p id="temperature"></p>
                <p id="description"></p>
              </div>
            </div>

             <div class="weather-details">
              <div>Feels like: <span id="feels-like"></span></div>
              <div>Humidity: <span id="humidity"></span></div>
              <div>Wind: <span id="wind"></span></div>
              <div>Pressure: <span id="pressure"></span></div>
            </div>
</div>
        </section>

 <!-- Forecast -->
        <section id="forecast">
          <h2>5‑Day Forecast</h2>
          <div id="forecast-cards"></div>
        </section>

      </div> <!-- END Right Column -->  
      
      </main> <!-- END Main Grid -->

<!-- Footer -->
    <footer class="footer">
      © 2026 Zsolt Földes — Weather Dashboard
    </footer>

  </div>
  <!-- END Page Wrapper -->      
            

<!-- Custom JS -->
    <script src="assets/js/script.js"></script>
  </body>

</html>
